name: AI Code Review
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Diff
        run: git diff origin/${{ github.base_ref }}...origin/${{ github.head_ref }} > pr.diff

      - name: OpenAI Review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          pip install openai
          python -c "
          import os
          from openai import OpenAI
          
          client = OpenAI()
          with open('pr.diff', 'r') as f:
              diff = f.read()
              
          response = client.chat.completions.create(
              model='gpt-4o',
              messages=[
                  {'role': 'system', 'content': 'You are an expert code reviewer auditing a PR generated by Claude Code. Provide critical feedback.'},
                  {'role': 'user', 'content': f'Review this diff:\n\n{diff}'}
              ]
          )
          print(response.choices[0].message.content)
          " > review.md

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr comment ${{ github.event.pull_request.number }} --body-file review.md
